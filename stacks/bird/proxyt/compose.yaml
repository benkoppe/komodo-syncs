services:
  proxyt:
    image: "ghcr.io/jaxxstorm/proxyt:latest"
    volumes:
      - proxyt-certs:/certs
    command: serve --domain proxyt.thekoppe.com --cert-dir /certs --http-only --issue=false
    networks:
      - cloudflared

volumes:
  proxyt-certs:

networks:
  cloudflared:
    external: true
